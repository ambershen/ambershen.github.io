<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Prototype 2 — Parallax Tilt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5F1EB;
      color: #1C1C1E;
      font-family: 'Geist Sans', system-ui, sans-serif;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      padding: 48px 24px 12px;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      opacity: 0.3;
      margin-bottom: 48px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 40px 80px;
      perspective: 1000px;
    }
    .piece {
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.1s ease-out, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .piece img {
      width: 100%;
      display: block;
    }
    .piece .caption {
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      margin-top: 10px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }
    .piece:hover .caption {
      opacity: 0.8;
    }
    /* Shine / glare overlay */
    .piece .glare {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: radial-gradient(circle at 50% 50%,
        rgba(255,255,255,0.25) 0%,
        transparent 60%
      );
    }
    .piece:hover .glare {
      opacity: 1;
    }
    /* Shadow element */
    .piece .shadow {
      position: absolute;
      inset: 4px;
      z-index: -1;
      border-radius: 2px;
      transition: all 0.2s ease-out;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .piece:hover .shadow {
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .piece .img-wrap {
      position: relative;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>Prototype 2 — Parallax Tilt</h1>
  <p class="subtitle">Hover and move your cursor across each painting. They tilt in 3D with a glare effect.</p>

  <div class="gallery">
    <div class="piece">
      <div class="img-wrap">
        <img src="/images/art-paintings/amberber_edward_hopper_painting_depicting_a_building_with_two_n_ad1fa9c4-5847-4918-822f-bbbab1a80937.png" alt="Night Times" />
        <div class="glare"></div>
      </div>
      <div class="shadow"></div>
      <p class="caption">Night Times</p>
    </div>
    <div class="piece">
      <div class="img-wrap">
        <img src="/images/art-paintings/amberber_a_surrealist_house_constructed_entirely_of_billowing_7b7428e2-6860-4ad0-80fa-fc25d93e6e35_0 (1).png" alt="Cloud House" />
        <div class="glare"></div>
      </div>
      <div class="shadow"></div>
      <p class="caption">Cloud House</p>
    </div>
    <div class="piece">
      <div class="img-wrap">
        <img src="/images/art-paintings/amberber_dreamcore_surrealist_vintage_bicycle_constructed_ent_866176a6-b66e-4faa-b0d8-7f7c0fd2f855_3.png" alt="Feather Bicycle" />
        <div class="glare"></div>
      </div>
      <div class="shadow"></div>
      <p class="caption">Feather Bicycle</p>
    </div>
    <div class="piece">
      <div class="img-wrap">
        <img src="/images/art-paintings/spring.jpeg" alt="Spring" />
        <div class="glare"></div>
      </div>
      <div class="shadow"></div>
      <p class="caption">Spring</p>
    </div>
    <div class="piece">
      <div class="img-wrap">
        <img src="/images/art-paintings/summer.jpeg" alt="Summer" />
        <div class="glare"></div>
      </div>
      <div class="shadow"></div>
      <p class="caption">Summer</p>
    </div>
    <div class="piece">
      <div class="img-wrap">
        <img src="/images/art-paintings/autumn.jpeg" alt="Autumn" />
        <div class="glare"></div>
      </div>
      <div class="shadow"></div>
      <p class="caption">Autumn</p>
    </div>
  </div>

  <script>
    document.querySelectorAll('.piece').forEach((piece) => {
      const glare = piece.querySelector('.glare');
      const shadow = piece.querySelector('.shadow');

      piece.addEventListener('mousemove', (e) => {
        const rect = piece.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;   // 0..1
        const y = (e.clientY - rect.top) / rect.height;    // 0..1
        const rotateY = (x - 0.5) * 20;  // -10 to 10 deg
        const rotateX = (0.5 - y) * 20;  // -10 to 10 deg

        piece.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;

        // Move glare with cursor
        glare.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(255,255,255,0.3) 0%, transparent 60%)`;

        // Shift shadow opposite to tilt
        const sx = (0.5 - x) * 20;
        const sy = (0.5 - y) * 20;
        shadow.style.transform = `translateX(${sx}px) translateY(${sy}px)`;
      });

      piece.addEventListener('mouseleave', () => {
        piece.style.transform = 'rotateX(0) rotateY(0) scale(1)';
        piece.style.transition = 'transform 0.5s ease';
        shadow.style.transform = 'translateX(0) translateY(0)';
        setTimeout(() => { piece.style.transition = 'transform 0.1s ease-out'; }, 500);
      });

      piece.addEventListener('mouseenter', () => {
        piece.style.transition = 'transform 0.1s ease-out';
      });
    });
  </script>
</body>
</html>
