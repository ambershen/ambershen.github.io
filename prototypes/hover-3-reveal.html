<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Prototype 3 — Magnetic Reveal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5F1EB;
      color: #1C1C1E;
      font-family: 'Geist Sans', system-ui, sans-serif;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      padding: 48px 24px 12px;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      opacity: 0.3;
      margin-bottom: 48px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }
    .piece {
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }
    .piece img {
      width: 100%;
      display: block;
    }
    /* Grain overlay via SVG filter */
    .piece .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      mix-blend-mode: overlay;
      opacity: 0.8;
      transition: opacity 0.4s;
    }
    /* Fog / frosted overlay */
    .piece .frost {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(245, 241, 235, 0.65);
      backdrop-filter: blur(4px) saturate(0.6);
      -webkit-backdrop-filter: blur(4px) saturate(0.6);
      /* Mask that follows cursor — set via JS */
      -webkit-mask-image: radial-gradient(circle 200px at 50% 50%, transparent 0%, black 100%);
      mask-image: radial-gradient(circle 200px at 50% 50%, transparent 0%, black 100%);
      transition: opacity 0.4s;
    }
    .piece .caption {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s;
      color: #1C1C1E;
      background: rgba(245, 241, 235, 0.7);
      padding: 4px 10px;
      backdrop-filter: blur(8px);
    }
    .piece:hover .caption {
      opacity: 1;
    }
    /* Subtle border that appears on hover */
    .piece::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color 0.4s;
      pointer-events: none;
    }
    .piece:hover::after {
      border-color: rgba(28, 28, 30, 0.1);
    }
  </style>
</head>
<body>
  <h1>Prototype 3 — Magnetic Reveal</h1>
  <p class="subtitle">Paintings are frosted over. Move your cursor to wipe away the fog and reveal the art beneath.</p>

  <div class="gallery">
    <div class="piece">
      <img src="/images/art-paintings/amberber_edward_hopper_painting_depicting_a_building_with_two_n_ad1fa9c4-5847-4918-822f-bbbab1a80937.png" alt="Night Times" />
      <div class="frost"></div>
      <div class="grain"></div>
      <span class="caption">Night Times</span>
    </div>
    <div class="piece">
      <img src="/images/art-paintings/amberber_a_surrealist_house_constructed_entirely_of_billowing_7b7428e2-6860-4ad0-80fa-fc25d93e6e35_0 (1).png" alt="Cloud House" />
      <div class="frost"></div>
      <div class="grain"></div>
      <span class="caption">Cloud House</span>
    </div>
    <div class="piece">
      <img src="/images/art-paintings/amberber_dreamcore_surrealist_vintage_bicycle_constructed_ent_866176a6-b66e-4faa-b0d8-7f7c0fd2f855_3.png" alt="Feather Bicycle" />
      <div class="frost"></div>
      <div class="grain"></div>
      <span class="caption">Feather Bicycle</span>
    </div>
    <div class="piece">
      <img src="/images/art-paintings/spring.jpeg" alt="Spring" />
      <div class="frost"></div>
      <div class="grain"></div>
      <span class="caption">Spring</span>
    </div>
    <div class="piece">
      <img src="/images/art-paintings/summer.jpeg" alt="Summer" />
      <div class="frost"></div>
      <div class="grain"></div>
      <span class="caption">Summer</span>
    </div>
    <div class="piece">
      <img src="/images/art-paintings/autumn.jpeg" alt="Autumn" />
      <div class="frost"></div>
      <div class="grain"></div>
      <span class="caption">Autumn</span>
    </div>
  </div>

  <script>
    document.querySelectorAll('.piece').forEach((piece) => {
      const frost = piece.querySelector('.frost');
      const grain = piece.querySelector('.grain');

      piece.addEventListener('mousemove', (e) => {
        const rect = piece.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Frost clears around cursor
        const mask = `radial-gradient(circle 120px at ${x}px ${y}px, transparent 30%, black 100%)`;
        frost.style.webkitMaskImage = mask;
        frost.style.maskImage = mask;

        // Grain fades near cursor too
        const gmask = `radial-gradient(circle 150px at ${x}px ${y}px, transparent 20%, black 100%)`;
        grain.style.webkitMaskImage = gmask;
        grain.style.maskImage = gmask;
      });

      piece.addEventListener('mouseleave', () => {
        // Reset — fog returns
        frost.style.webkitMaskImage = '';
        frost.style.maskImage = '';
        grain.style.webkitMaskImage = '';
        grain.style.maskImage = '';
      });
    });
  </script>
</body>
</html>
